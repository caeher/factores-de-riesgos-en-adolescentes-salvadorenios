# Configuración de ejemplo para el proyecto fras.
# Copia este archivo a config.yaml y ajusta los valores según tu caso.

project:
  name: fras
  random_seed: 42

paths:
  raw_data: data/raw
  processed_data: data/processed
  models: models
  reports: reports/figures

data:
  raw_file: SLV2013_Public_Use.csv
  target_imc: IMC
  target_mental_health: Riesgo_Salud_Mental
  mental_health_target: qn24

model:
  regression:
    - linear_regression
    - random_forest
  classification:
    - logistic_regression
    - random_forest
    - xgboost

training:
  test_size: 0.2
  cross_validation_folds: 5
